<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بورتفوليو - عبدالمتعال</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
        }
        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 60px 20px;
        }
        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        header p {
            font-size: 18px;
            color: #bdc3c7;
        }
        section {
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        section h2 {
            color: #2c3e50;
            border-bottom: 3px solid #16a085;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .skill-tag {
            background-color: #16a085;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .contact-btn {
            display: inline-block;
            background-color: #16a085;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            margin-top: 10px;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>عبدالمتعال صابون</h1>
        <p>مطوّر ويب مبتدئ | شغوف بتصميم المواقع</p>
    </header>

    <section>
        <h2>من أنا</h2>
        <p>أتعلم حاليًا تصميم وبرمجة المواقع باستخدام HTML وCSS وJavaScript، وأبني مشاريعي الأولى خطوة بخطوة.</p>
    </section>

    <section>
        <h2>مهاراتي</h2>
        <div class="skills">
            <span class="skill-tag">HTML</span>
            <span class="skill-tag">CSS</span>
            <span class="skill-tag">JavaScript</span>
            <span class="skill-tag">تعلّم سريع</span>
        </div>
    </section>

    <section>
        <h2>تواصل معي</h2>
        <p>هل لديك مشروع أو فكرة؟ راسلني!</p>
        <a href="mailto:example@email.com" class="contact-btn">راسلني عبر الإيميل</a>
    </section>

    <footer>
        © 2026 عبدالمتعال صابون
    </footer>

</body>
</html>
